# =============================================================================
# Global Variables for Standalone Ironic Deployment
# =============================================================================

# -----------------------------------------------------------------------------
# Container Image Configuration
# -----------------------------------------------------------------------------
# Standalone Ironic image is published to GHCR from:
# https://github.com/mattcburns/ironic-standalone
ironic_image_repo: "ghcr.io/mattcburns"
ironic_image_name: "ironic-standalone"
# Default to the branch tag published on every push.
# Override with a release tag (for example, v35.0.1) when pinning upgrades.
ironic_image_tag: "master"

# -----------------------------------------------------------------------------
# Docker / Container Runtime
# -----------------------------------------------------------------------------

docker_bin: "/usr/bin/docker"
docker_network_name: "ironic-network"

# -----------------------------------------------------------------------------
# Containerized Ironic CLI Helper
# -----------------------------------------------------------------------------

ironic_cli_enabled: true
ironic_cli_wrapper_path: "/usr/local/bin/ironic-cli"
ironic_cli_env_file: "{{ ironic_etc_dir }}/ironic-cli.env"
# Dedicated OpenStack/Ironic CLI image with baremetal + keystone client plugins
ironic_cli_image: "ghcr.io/mattcburns/ironic-cli:latest"
# Host networking aligns with the upstream wrapper behavior for local endpoint reachability
ironic_cli_network_name: "host"
# CLI from the host should target the published API port
ironic_cli_endpoint: "http://127.0.0.1:{{ ironic_api_port }}"
ironic_cli_auth_type: "{{ 'http_basic' if ironic_auth_strategy == 'http_basic' else ('v3password' if keystone_enabled | bool else 'none') }}"
ironic_cli_baremetal_api_version: ""

# -----------------------------------------------------------------------------
# OpenStack clouds.yaml (for native --os-cloud authentication)
# -----------------------------------------------------------------------------

ironic_clouds_yaml_enabled: true
ironic_clouds_yaml_path: "/etc/openstack/clouds.yaml"
ironic_cloud_name: "ironic"
ironic_cloud_interface: "public"
ironic_cloud_region_name: "RegionOne"
# Generated deployment cheat sheet containing common ironic-cli commands and
# resolved local paths/URLs.
ironic_quickstart_enabled: true
ironic_quickstart_path: "{{ ironic_etc_dir }}/QUICKSTART.md"

# -----------------------------------------------------------------------------
# Service Account Configuration
# -----------------------------------------------------------------------------

ironic_service_user: "ironic"
ironic_service_group: "ironic"

# -----------------------------------------------------------------------------
# MariaDB Configuration
# -----------------------------------------------------------------------------

mariadb_image: "mariadb:11.4"

mariadb_database: "ironic"
mariadb_user: "ironic"
mariadb_password: "ironic_secure_password_here" # CHANGE IN PRODUCTION
mariadb_root_password: "ironic_root_password_here" # CHANGE IN PRODUCTION

mariadb_container_name: "ironic-mariadb"
mariadb_port: 3306
mariadb_bind_addr: "127.0.0.1" # Containers use Docker network; host port is for debugging only
mariadb_data_dir: "/var/lib/ironic/mariadb"

# -----------------------------------------------------------------------------
# RabbitMQ Configuration
# -----------------------------------------------------------------------------

rabbitmq_image: "rabbitmq:3.13-management"

rabbitmq_container_name: "ironic-rabbitmq"
rabbitmq_user: "ironic"
rabbitmq_password: "ironic_rabbitmq_password_here" # CHANGE IN PRODUCTION
rabbitmq_vhost: "/"

rabbitmq_amqp_port: 5672
rabbitmq_management_port: 15672
rabbitmq_bind_addr: "127.0.0.1" # Containers use Docker network; host port is for debugging only
rabbitmq_data_dir: "/var/lib/ironic/rabbitmq"

# -----------------------------------------------------------------------------
# Ironic API Configuration
# -----------------------------------------------------------------------------

ironic_api_container_name: "ironic-api"
ironic_api_port: 6385
ironic_api_workers: 1

# Authentication
ironic_auth_strategy: "http_basic"
ironic_admin_username: "admin"
ironic_admin_password: "ironic_admin_password_here" # CHANGE IN PRODUCTION

# API bind address
ironic_api_bind_addr: "0.0.0.0"
# The public IP used in boot ISOs, IPA callback URLs, and conductor config.
# On multi-homed hosts, override this to the IP reachable from the BMC/provisioning network.
ironic_api_host: "{{ ansible_default_ipv4.address | default(ansible_fqdn) }}"

# -----------------------------------------------------------------------------
# Ironic HTTP Server Configuration
# -----------------------------------------------------------------------------

ironic_http_container_name: "ironic-http"
ironic_http_image: "nginx:1.27-alpine"
ironic_http_port: 6180
ironic_http_bind_addr: "0.0.0.0"
ironic_http_images_dir: "/var/lib/ironic/http-images"

# -----------------------------------------------------------------------------
# Ironic Conductor Configuration
# -----------------------------------------------------------------------------
# Number of conductor instances to run in the default (non-grouped) mode.
# Increase this value to scale conductors horizontally.
ironic_conductor_replicas: 1

# Default green-thread pool size per conductor. Ironic's upstream default is
# 100, but the calculated minimum depends on the number of enabled hardware
# types and interfaces. 128 provides comfortable headroom.
ironic_conductor_default_workers: 128

# Enable automated cleaning when nodes move to available state.
ironic_automated_clean: true
# Advanced option: define conductor groups for targeted scheduling.
# Leave this empty to use the simple default replica mode above.
# Each group inherits ironic_conductor_default_workers unless an explicit
# 'workers' key is provided.
ironic_conductor_groups: []

# Example advanced grouped mode:
# ironic_conductor_groups:
#   - name: "group1"
#   - name: "group2"
#     workers: 256

# -----------------------------------------------------------------------------
# Ironic Driver & Interface Configuration
# -----------------------------------------------------------------------------

ironic_enabled_hardware_types: "redfish"

# Boot: virtual media primary, HTTPS boot secondary
ironic_enabled_boot_interfaces: "redfish-virtual-media,redfish-https"
ironic_default_boot_interface: "redfish-virtual-media"

# Deploy: direct by default for image writing; keep ramdisk available as fallback.
ironic_enabled_deploy_interfaces: "direct,ramdisk"
ironic_default_deploy_interface: "direct"
# Boot ISO settings for UEFI virtual-media ISO creation.
# ESP image artifacts are sourced from:
# https://github.com/mattcburns/ironic-iso
ironic_esp_image_release_tag: "v0.0.27"
ironic_esp_image_filename: "esp.img"
ironic_esp_image_url: "https://github.com/mattcburns/ironic-iso/releases/download/{{ ironic_esp_image_release_tag }}/{{ ironic_esp_image_filename }}"
# The ESP image is downloaded under ironic_http_images_dir and mounted into the
# conductor container at /shared/html.
ironic_grub_config_path: "EFI/centos/grub.cfg"
ironic_bootloader: "file:///shared/html/{{ ironic_esp_image_filename }}"
ironic_bootloader_by_arch: ""
ironic_file_url_allowed_paths: ""

# Network: noop for standalone (no Neutron)
ironic_enabled_network_interfaces: "noop"
ironic_default_network_interface: "noop"

# Inspect: prefer out-of-band Redfish inspection
ironic_enabled_inspect_interfaces: "redfish,no-inspect"
ironic_default_inspect_interface: "redfish"

# Management & Power
ironic_enabled_management_interfaces: "redfish,noop"
ironic_enabled_power_interfaces: "redfish"

# RAID
ironic_enabled_raid_interfaces: "agent,no-raid"

# -----------------------------------------------------------------------------
# Inspection Configuration
# -----------------------------------------------------------------------------

ironic_inspect_timeout: 3600

# -----------------------------------------------------------------------------
# Storage Paths
# -----------------------------------------------------------------------------

ironic_data_root: "/var/lib/ironic"
ironic_etc_dir: "/etc/ironic"
ironic_var_log_dir: "/var/log/ironic"

# -----------------------------------------------------------------------------
# IPA (Ironic Python Agent) Configuration
# -----------------------------------------------------------------------------

ipa_base_url: "https://tarballs.opendev.org/openstack/ironic-python-agent/dib/files"
ipa_images_directory: "{{ ironic_http_images_dir }}/ipa"

# IPA images to download.
# WARNING: The default "master" images are continuously-updated upstream CI
# builds and may change without notice. For production, use a stable release
# branch (e.g. ipa-centos9-stable-2024.2.kernel / .initramfs).
ipa_kernel_filename: "ipa-centos9-master.kernel"
ipa_ramdisk_filename: "ipa-centos9-master.initramfs"
# Base kernel parameters passed to IPA for deploy/clean/inspection boots.
ironic_ipa_kernel_append_params: "nofb vga=normal"
# Optional public SSH key injected into the IPA ramdisk for debugging.
# Example: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@example"
# Note: dynamic-login supports one key via sshkey="...".
ironic_ipa_ssh_public_key: ""

ipa_downloader_script_path: "/opt/ironic/ipa-downloader.sh"
os_image_downloader_script_path: "/opt/ironic/os-image-downloader.sh"
# -----------------------------------------------------------------------------
# Provisioning Image Mirror (Ubuntu LTS)
# -----------------------------------------------------------------------------
# Download and expose a Ubuntu LTS cloud image via ironic-http.
ubuntu_lts_image_enabled: true
# Default is pinned to Ubuntu 24.04 LTS (noble) for deployment stability.
# Set this to an empty string to auto-resolve latest LTS from
# ubuntu_lts_meta_release_url instead.
ubuntu_lts_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-{{ ubuntu_lts_image_arch }}.img"
ubuntu_lts_meta_release_url: "https://changelogs.ubuntu.com/meta-release-lts"
ubuntu_lts_image_arch: "amd64"
ubuntu_lts_image_disk_format: "qcow2"
ubuntu_lts_image_directory: "{{ ironic_http_images_dir }}/ubuntu"
# Keep the mirrored filename aligned with the upstream artifact name (codename included).
ubuntu_lts_image_filename: "{{ ubuntu_lts_image_url | regex_replace('^.*/', '') | regex_replace('\\?.*$', '') }}"
ubuntu_lts_image_local_path: "{{ ubuntu_lts_image_directory }}/{{ ubuntu_lts_image_filename }}"
ubuntu_lts_image_checksum_local_path: "{{ ubuntu_lts_image_local_path }}.sha256"
ubuntu_lts_image_http_url: "http://{{ ironic_api_host }}:{{ ironic_http_port }}/ubuntu/{{ ubuntu_lts_image_filename }}"
ubuntu_lts_image_checksum_http_url: "{{ ubuntu_lts_image_http_url }}.sha256"
# -----------------------------------------------------------------------------
# Provisioning Image Mirror (Flatcar Linux)
# -----------------------------------------------------------------------------
# Optional Flatcar ramdisk mirror (kernel/initramfs artifacts for ramdisk deploy mode).
flatcar_image_enabled: true
flatcar_image_directory: "{{ ironic_http_images_dir }}/flatcar"
# Ignition config path/URL for Flatcar first boot (ramdisk workflow docs).
flatcar_ignition_filename: "config.ign"
flatcar_ignition_local_path: "{{ flatcar_image_directory }}/{{ flatcar_ignition_filename }}"
flatcar_ignition_http_url: "http://{{ ironic_api_host }}:{{ ironic_http_port }}/flatcar/{{ flatcar_ignition_filename }}"
# Flatcar live-boot source artifacts are mirrored locally by os-image-downloader.
flatcar_ramdisk_kernel_source_url: "https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_image.vmlinuz"
flatcar_ramdisk_initramfs_source_url: "https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_image.bin.bz2"
flatcar_ramdisk_kernel_filename: "{{ (flatcar_ramdisk_kernel_source_url.split('?') | first) | basename }}"
flatcar_ramdisk_initramfs_filename: "{{ (flatcar_ramdisk_initramfs_source_url.split('?') | first) | basename }}"
flatcar_ramdisk_kernel_local_path: "{{ flatcar_image_directory }}/{{ flatcar_ramdisk_kernel_filename }}"
flatcar_ramdisk_initramfs_local_path: "{{ flatcar_image_directory }}/{{ flatcar_ramdisk_initramfs_filename }}"
flatcar_ramdisk_kernel_checksum_local_path: "{{ flatcar_ramdisk_kernel_local_path }}.sha256"
flatcar_ramdisk_initramfs_checksum_local_path: "{{ flatcar_ramdisk_initramfs_local_path }}.sha256"
flatcar_ramdisk_kernel_http_url: "http://{{ ironic_api_host }}:{{ ironic_http_port }}/flatcar/{{ flatcar_ramdisk_kernel_filename }}"
flatcar_ramdisk_initramfs_http_url: "http://{{ ironic_api_host }}:{{ ironic_http_port }}/flatcar/{{ flatcar_ramdisk_initramfs_filename }}"
# Default ramdisk deploy references use locally mirrored artifacts.
flatcar_ramdisk_kernel_url: "{{ flatcar_ramdisk_kernel_http_url }}"
flatcar_ramdisk_initramfs_url: "{{ flatcar_ramdisk_initramfs_http_url }}"
flatcar_ramdisk_kernel_params: "flatcar.first_boot=1 ignition.config.url={{ flatcar_ignition_http_url }}"

# -----------------------------------------------------------------------------
# SSL/TLS (Optional)
# -----------------------------------------------------------------------------

ironic_enable_ssl: false
ironic_ssl_cert_path: ""
ironic_ssl_key_path: ""

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------

ironic_log_level: "INFO"
ironic_log_dir: "{{ ironic_var_log_dir }}"

# -----------------------------------------------------------------------------
# Future Keystone Integration
# -----------------------------------------------------------------------------

keystone_enabled: false
keystone_auth_url: ""
keystone_project_name: "service"
keystone_username: "ironic"
keystone_password: ""
keystone_user_domain_name: "Default"
keystone_project_domain_name: "Default"
