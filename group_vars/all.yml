# =============================================================================
# Global Variables for Standalone Ironic Deployment
# =============================================================================

# -----------------------------------------------------------------------------
# Container Image Configuration
# -----------------------------------------------------------------------------
# Metal3-io images are published to quay.io.
# See: https://quay.io/organization/metal3-io

ironic_image_repo: "quay.io/metal3-io"
# WARNING: Using "latest" will silently pull new versions on every service
# restart. Pin to a release tag for production (e.g. "v34.0.0").
ironic_image_tag: "latest"

# -----------------------------------------------------------------------------
# Docker / Container Runtime
# -----------------------------------------------------------------------------

docker_bin: "/usr/bin/docker"
docker_network_name: "ironic-network"

# -----------------------------------------------------------------------------
# Containerized Ironic CLI Helper
# -----------------------------------------------------------------------------

ironic_cli_enabled: true
ironic_cli_wrapper_path: "/usr/local/bin/ironic-cli"
ironic_cli_env_file: "{{ ironic_etc_dir }}/ironic-cli.env"
ironic_cli_image: "{{ ironic_image_repo }}/ironic:{{ ironic_image_tag }}"
ironic_cli_network_name: "{{ docker_network_name }}"
ironic_cli_endpoint: "http://{{ ironic_api_container_name }}:6385"
ironic_cli_auth_type: "{{ 'http_basic' if ironic_auth_strategy == 'http_basic' else 'none' }}"
ironic_cli_baremetal_api_version: ""

# -----------------------------------------------------------------------------
# OpenStack clouds.yaml (for native --os-cloud authentication)
# -----------------------------------------------------------------------------

ironic_clouds_yaml_enabled: true
ironic_clouds_yaml_path: "/etc/openstack/clouds.yaml"
ironic_cloud_name: "ironic"
ironic_cloud_interface: "public"
ironic_cloud_region_name: "RegionOne"

# -----------------------------------------------------------------------------
# Service Account Configuration
# -----------------------------------------------------------------------------

ironic_service_user: "ironic"
ironic_service_group: "ironic"

# -----------------------------------------------------------------------------
# MariaDB Configuration
# -----------------------------------------------------------------------------

mariadb_image: "mariadb:11.4"

mariadb_database: "ironic"
mariadb_user: "ironic"
mariadb_password: "ironic_secure_password_here"      # CHANGE IN PRODUCTION
mariadb_root_password: "ironic_root_password_here"    # CHANGE IN PRODUCTION

mariadb_container_name: "ironic-mariadb"
mariadb_port: 3306
mariadb_bind_addr: "127.0.0.1"  # Containers use Docker network; host port is for debugging only
mariadb_data_dir: "/var/lib/ironic/mariadb"

# -----------------------------------------------------------------------------
# RabbitMQ Configuration
# -----------------------------------------------------------------------------

rabbitmq_image: "rabbitmq:3.13-management"

rabbitmq_container_name: "ironic-rabbitmq"
rabbitmq_user: "ironic"
rabbitmq_password: "ironic_rabbitmq_password_here"    # CHANGE IN PRODUCTION
rabbitmq_vhost: "/"

rabbitmq_amqp_port: 5672
rabbitmq_management_port: 15672
rabbitmq_bind_addr: "127.0.0.1"  # Containers use Docker network; host port is for debugging only
rabbitmq_data_dir: "/var/lib/ironic/rabbitmq"

# -----------------------------------------------------------------------------
# Ironic API Configuration
# -----------------------------------------------------------------------------

ironic_api_container_name: "ironic-api"
ironic_api_port: 6385

# Authentication
ironic_auth_strategy: "http_basic"
ironic_admin_username: "admin"
ironic_admin_password: "ironic_admin_password_here"   # CHANGE IN PRODUCTION

# API bind address
ironic_api_bind_addr: "0.0.0.0"
# The public IP used in boot ISOs, IPA callback URLs, and conductor config.
# On multi-homed hosts, override this to the IP reachable from the BMC/provisioning network.
ironic_api_host: "{{ ansible_default_ipv4.address | default(ansible_fqdn) }}"

# -----------------------------------------------------------------------------
# Ironic HTTP Server Configuration
# -----------------------------------------------------------------------------

ironic_http_container_name: "ironic-http"
ironic_http_image: "nginx:1.27-alpine"
ironic_http_port: 6180
ironic_http_bind_addr: "0.0.0.0"
ironic_http_images_dir: "/var/lib/ironic/http-images"

# -----------------------------------------------------------------------------
# Ironic Conductor Configuration
# -----------------------------------------------------------------------------

ironic_conductor_groups:
  - name: "group1"
    workers: 4
  - name: "group2"
    workers: 4

# -----------------------------------------------------------------------------
# Ironic Driver & Interface Configuration
# -----------------------------------------------------------------------------

ironic_enabled_hardware_types: "ipmi,redfish"

# Boot: virtual media primary, HTTPS boot secondary
ironic_enabled_boot_interfaces: "redfish-virtual-media,redfish-https"
ironic_default_boot_interface: "redfish-virtual-media"

# Deploy: ramdisk for virtual media based ISO boot
ironic_enabled_deploy_interfaces: "direct,ramdisk"
ironic_default_deploy_interface: "ramdisk"

# Network: noop for standalone (no Neutron)
ironic_enabled_network_interfaces: "noop"
ironic_default_network_interface: "noop"

# Inspect: agent-based inspection
ironic_enabled_inspect_interfaces: "agent,no-inspect"
ironic_default_inspect_interface: "agent"

# Management & Power
ironic_enabled_management_interfaces: "ipmitool,redfish,noop"
ironic_enabled_power_interfaces: "ipmitool,redfish"

# RAID
ironic_enabled_raid_interfaces: "agent,no-raid"

# -----------------------------------------------------------------------------
# Inspection Configuration
# -----------------------------------------------------------------------------

ironic_inspect_timeout: 3600

# -----------------------------------------------------------------------------
# Storage Paths
# -----------------------------------------------------------------------------

ironic_data_root: "/var/lib/ironic"
ironic_etc_dir: "/etc/ironic"
ironic_var_log_dir: "/var/log/ironic"

# -----------------------------------------------------------------------------
# IPA (Ironic Python Agent) Configuration
# -----------------------------------------------------------------------------

ipa_base_url: "https://tarballs.opendev.org/openstack/ironic-python-agent/dib/files"
ipa_images_directory: "{{ ironic_http_images_dir }}/ipa"

# IPA images to download.
# WARNING: The default "master" images are continuously-updated upstream CI
# builds and may change without notice. For production, use a stable release
# branch (e.g. ipa-centos9-stable-2024.2.kernel / .initramfs).
ipa_kernel_filename: "ipa-centos9-master.kernel"
ipa_ramdisk_filename: "ipa-centos9-master.initramfs"

ipa_downloader_script_path: "/opt/ironic/ipa-downloader.sh"

# -----------------------------------------------------------------------------
# SSL/TLS (Optional)
# -----------------------------------------------------------------------------

ironic_enable_ssl: false
ironic_ssl_cert_path: ""
ironic_ssl_key_path: ""

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------

ironic_log_level: "INFO"
ironic_log_dir: "{{ ironic_var_log_dir }}"

# -----------------------------------------------------------------------------
# Future Keystone Integration
# -----------------------------------------------------------------------------

keystone_enabled: false
keystone_auth_url: ""
keystone_project_name: "service"
keystone_username: "ironic"
keystone_password: ""
keystone_user_domain_name: "Default"
keystone_project_domain_name: "Default"
