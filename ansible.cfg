[defaults]
# Don't ask for password confirmation
ask_pass = False

# Don't ask for sudo password confirmation
ask_become_pass = False

# Use SSH agent forwarding
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Fact caching for faster re-runs
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Timeout for operations
timeout = 30

# Host key checking (disable for localhost)
host_key_checking = False

# Log path
log_path = /tmp/ansible.log

# Display verbosity (adjust as needed)
# verbosity =

# Inventory syntax
inventory_ignore_extensions = ~, .orig, .bak, .ini, .cs, .ml, .pyc, .pyo, .git, .svn, .md, .txt

[privilege_escalation]
# Use sudo for privilege escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Use ControlPersist for faster connections
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[inventory]
# Enable dynamic inventory plugins
enable_plugins = host_list, script, auto, yaml, ini, toml
