---
- name: Generate per-conductor config overrides (default replica mode)
  ansible.builtin.template:
    src: conductor-override.conf.j2
    dest: "{{ ironic_etc_dir }}/conductor-{{ item }}.conf"
    mode: '0640'
    owner: "{{ ironic_service_user }}"
    group: "{{ ironic_service_group }}"
  loop: "{{ range(1, (ironic_conductor_replicas | int) + 1) | list }}"
  loop_control:
    label: "{{ item }}"
  vars:
    conductor_instance_name: "{{ item }}"
    conductor_workers_pool_size: "{{ ironic_conductor_default_workers }}"
    conductor_group_name: ""
  when: (ironic_conductor_groups | default([])) | length == 0

- name: Generate per-conductor config overrides (advanced grouped mode)
  ansible.builtin.template:
    src: conductor-override.conf.j2
    dest: "{{ ironic_etc_dir }}/conductor-{{ item.name }}.conf"
    mode: '0640'
    owner: "{{ ironic_service_user }}"
    group: "{{ ironic_service_group }}"
  loop: "{{ ironic_conductor_groups }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    conductor_instance_name: "{{ item.name }}"
    conductor_workers_pool_size: "{{ item.workers | default(ironic_conductor_default_workers) }}"
    conductor_group_name: "{{ item.name }}"
  when: (ironic_conductor_groups | default([])) | length > 0

- name: Deploy Ironic conductor systemd template unit
  ansible.builtin.template:
    src: ironic-conductor@.service.j2
    dest: /etc/systemd/system/ironic-conductor@.service
    mode: '0644'
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start conductor instances (default replica mode)
  ansible.builtin.systemd:
    name: "ironic-conductor@{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ range(1, (ironic_conductor_replicas | int) + 1) | list }}"
  loop_control:
    label: "{{ item }}"
  when: (ironic_conductor_groups | default([])) | length == 0
- name: Restart conductor instances (default replica mode) when messaging configuration changed
  ansible.builtin.systemd:
    name: "ironic-conductor@{{ item }}"
    state: restarted
  loop: "{{ range(1, (ironic_conductor_replicas | int) + 1) | list }}"
  loop_control:
    label: "{{ item }}"
  when:
    - (ironic_conductor_groups | default([])) | length == 0
    - ironic_conf_changed | default(false) or rabbitmq_runtime_changed | default(false)

- name: Enable and start conductor instances (advanced grouped mode)
  ansible.builtin.systemd:
    name: "ironic-conductor@{{ item.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ ironic_conductor_groups }}"
  loop_control:
    label: "{{ item.name }}"
  when: (ironic_conductor_groups | default([])) | length > 0

- name: Restart conductor instances (advanced grouped mode) when messaging configuration changed
  ansible.builtin.systemd:
    name: "ironic-conductor@{{ item.name }}"
    state: restarted
  loop: "{{ ironic_conductor_groups }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (ironic_conductor_groups | default([])) | length > 0
    - ironic_conf_changed | default(false) or rabbitmq_runtime_changed | default(false)
