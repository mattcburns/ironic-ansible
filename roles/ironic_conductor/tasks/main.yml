---
- name: Deploy Ironic conductor systemd template unit
  ansible.builtin.template:
    src: ironic-conductor@.service.j2
    dest: /etc/systemd/system/ironic-conductor@.service
    mode: '0644'
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start conductor instances
  ansible.builtin.systemd:
    name: "ironic-conductor@{{ item.name }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ ironic_conductor_groups }}"
  loop_control:
    label: "{{ item.name }}"
