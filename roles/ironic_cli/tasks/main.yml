---
- name: Configure containerized Ironic CLI helper
  when: ironic_cli_enabled | bool
  block:
    - name: Pull Ironic CLI container image
      community.docker.docker_image:
        name: "{{ ironic_cli_image }}"
        source: pull
    - name: Deploy Ironic CLI environment file
      ansible.builtin.template:
        src: ironic-cli.env.j2
        dest: "{{ ironic_cli_env_file }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true

    - name: Deploy Ironic CLI wrapper script
      ansible.builtin.template:
        src: ironic-cli.sh.j2
        dest: "{{ ironic_cli_wrapper_path }}"
        owner: root
        group: root
        mode: '0755'

- name: Configure OpenStack clouds.yaml for Ironic
  when: ironic_clouds_yaml_enabled | bool
  block:
    - name: Ensure OpenStack config directory exists
      ansible.builtin.file:
        path: "{{ ironic_clouds_yaml_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy OpenStack clouds.yaml
      ansible.builtin.template:
        src: clouds.yaml.j2
        dest: "{{ ironic_clouds_yaml_path }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true

- name: Configure generated QUICKSTART reference
  when: ironic_quickstart_enabled | bool
  block:
    - name: Ensure QUICKSTART directory exists
      ansible.builtin.file:
        path: "{{ ironic_quickstart_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy generated QUICKSTART markdown
      ansible.builtin.template:
        src: QUICKSTART.md.j2
        dest: "{{ ironic_quickstart_path }}"
        owner: root
        group: root
        mode: '0644'

- name: Remove containerized Ironic CLI helper when disabled
  when: not ironic_cli_enabled | bool
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ironic_cli_wrapper_path }}"
    - "{{ ironic_cli_env_file }}"

- name: Remove OpenStack clouds.yaml when disabled
  when: not ironic_clouds_yaml_enabled | bool
  ansible.builtin.file:
    path: "{{ ironic_clouds_yaml_path }}"
    state: absent

- name: Remove generated QUICKSTART markdown when disabled
  when: not ironic_quickstart_enabled | bool
  ansible.builtin.file:
    path: "{{ ironic_quickstart_path }}"
    state: absent
