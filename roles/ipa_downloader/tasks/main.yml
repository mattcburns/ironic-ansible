---
- name: Ensure IPA downloader directory exists
  ansible.builtin.file:
    path: "{{ ipa_downloader_script_path | dirname }}"
    state: directory
    mode: '0755'

- name: Copy IPA downloader script
  ansible.builtin.copy:
    src: ipa-downloader.sh
    dest: "{{ ipa_downloader_script_path }}"
    mode: '0755'

- name: Deploy IPA downloader systemd service
  ansible.builtin.template:
    src: ipa-downloader.service.j2
    dest: /etc/systemd/system/ipa-downloader.service
    mode: '0644'
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Run IPA downloader
  ansible.builtin.systemd:
    name: ipa-downloader
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for IPA images to be downloaded
  ansible.builtin.wait_for:
    path: "{{ ipa_images_directory }}/{{ item }}"
    timeout: 300
  loop:
    - "{{ ipa_kernel_filename }}"
    - "{{ ipa_ramdisk_filename }}"
  failed_when: false
