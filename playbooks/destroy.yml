---
- name: Stop All Ironic Services
  hosts: ironic
  become: true
  gather_facts: true
  tasks:
    - name: Stop conductor instances (default replica mode)
      ansible.builtin.systemd:
        name: "ironic-conductor@{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ range(1, (ironic_conductor_replicas | int) + 1) | list }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: true
      when: (ironic_conductor_groups | default([])) | length == 0

    - name: Stop conductor instances (advanced grouped mode)
      ansible.builtin.systemd:
        name: "ironic-conductor@{{ item.name }}"
        state: stopped
        enabled: false
      loop: "{{ ironic_conductor_groups }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      when: (ironic_conductor_groups | default([])) | length > 0

    - name: Stop and disable all services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - ironic-api
        - ironic-http
        - ipa-downloader
        - ironic-mariadb
        - ironic-rabbitmq
      ignore_errors: true

- name: Remove Service Files and Containers
  hosts: ironic
  become: true
  gather_facts: false
  tasks:
    - name: Remove systemd service files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/ironic-api.service
        - /etc/systemd/system/ironic-http.service
        - /etc/systemd/system/ironic-conductor@.service
        - /etc/systemd/system/ipa-downloader.service
        - /etc/systemd/system/ironic-mariadb.service
        - /etc/systemd/system/ironic-rabbitmq.service
        - "{{ ironic_cli_wrapper_path }}"
        - "{{ ironic_cli_env_file }}"
        - "{{ ironic_clouds_yaml_path }}"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Remove infrastructure containers
      ansible.builtin.command: "{{ docker_bin }} rm -f {{ item }}"
      loop:
        - "{{ ironic_api_container_name }}"
        - "{{ ironic_http_container_name }}"
        - "{{ mariadb_container_name }}"
        - "{{ rabbitmq_container_name }}"
      ignore_errors: true
      changed_when: true

    - name: Remove conductor containers (default replica mode)
      ansible.builtin.command: "{{ docker_bin }} rm -f ironic-conductor-{{ item }}"
      loop: "{{ range(1, (ironic_conductor_replicas | int) + 1) | list }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: true
      changed_when: true
      when: (ironic_conductor_groups | default([])) | length == 0

    - name: Remove conductor containers (advanced grouped mode)
      ansible.builtin.command: "{{ docker_bin }} rm -f ironic-conductor-{{ item.name }}"
      loop: "{{ ironic_conductor_groups }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      changed_when: true
      when: (ironic_conductor_groups | default([])) | length > 0

    - name: Remove Docker network
      community.docker.docker_network:
        name: "{{ docker_network_name }}"
        state: absent
      ignore_errors: true

- name: Remove Data and User
  hosts: ironic
  become: true
  gather_facts: false
  tasks:
    - name: Remove data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ironic_data_root }}"
        - "{{ ironic_etc_dir }}"
        - "{{ ironic_var_log_dir }}"
        - "{{ ipa_downloader_script_path | dirname }}"
        - "{{ ubuntu_lts_image_directory }}"

    - name: Remove service user
      ansible.builtin.user:
        name: "{{ ironic_service_user }}"
        state: absent
        remove: true
      ignore_errors: true

    - name: Remove service group
      ansible.builtin.group:
        name: "{{ ironic_service_group }}"
        state: absent
      ignore_errors: true

    - name: Show cleanup summary
      ansible.builtin.debug:
        msg: "Ironic deployment destroyed. Redeploy with: ansible-playbook playbooks/deploy.yml -i inventory"
