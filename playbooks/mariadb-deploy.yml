---
# MariaDB deployment playbook

- name: Deploy MariaDB Service
  hosts: localhost
  become: true
  gather_facts: true

  tasks:
    - name: Deploy MariaDB service template
      ansible.builtin.template:
        src: mariadb.service.j2
        dest: /etc/systemd/system/mariadb.service
        mode: '0644'
        backup: true
      notify: Restart systemd

    - name: Enable and start MariaDB service
      ansible.builtin.systemd:
        name: mariadb
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for MariaDB to be ready
      ansible.builtin.wait_for:
        port: "{{ mariadb_port }}"
        timeout: 60
      ignore_errors: true

handlers:
  - name: Restart systemd
    ansible.builtin.systemd:
      daemon_reload: true
