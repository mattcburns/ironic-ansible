---
# Main deployment playbook for Standalone Ironic

- name: Setup Prerequisites
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: common

- name: Deploy Infrastructure Services
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: mariadb
    - role: rabbitmq

- name: Deploy IPA and provisioning images
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ipa_downloader

- name: Deploy Ironic Configuration and Schema
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ironic_common

- name: Deploy Ironic Services
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ironic_http
    - role: ironic_api
    - role: ironic_conductor

- name: Deploy Containerized Ironic CLI Helper
  hosts: ironic
  become: true
  gather_facts: false
  roles:
    - role: ironic_cli

- name: Validate Deployment
  ansible.builtin.import_playbook: validate.yml

- name: Display Deployment Summary
  hosts: ironic
  gather_facts: false
  tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "Ironic Deployment Complete!"
          - "============================================"
          - "Ironic API: http://{{ ironic_api_host }}:{{ ironic_api_port }}"
          - "HTTP Server: http://{{ ironic_api_host }}:{{ ironic_http_port }}"
          - "{{ ('Ubuntu LTS image: ' ~ ubuntu_lts_image_http_url) if (ubuntu_lts_image_enabled | bool) else 'Ubuntu LTS image mirror: disabled' }}"
          - "{{ ('Ubuntu LTS checksum: ' ~ ubuntu_lts_image_checksum_http_url) if (ubuntu_lts_image_enabled | bool) else 'Ubuntu LTS checksum: disabled' }}"
          - "{{ ('Flatcar image: ' ~ flatcar_image_http_url) if (flatcar_image_enabled | bool) else 'Flatcar image mirror: disabled' }}"
          - "{{ ('Flatcar checksum: ' ~ flatcar_image_checksum_http_url) if (flatcar_image_enabled | bool) else 'Flatcar checksum: disabled' }}"
          - "MariaDB: localhost:{{ mariadb_port }}"
          - "RabbitMQ: localhost:{{ rabbitmq_amqp_port }}"
          - "RabbitMQ Management: http://localhost:{{ rabbitmq_management_port }}"
          - "Containerized Ironic CLI: {{ ironic_cli_wrapper_path if (ironic_cli_enabled | bool) else 'disabled' }}"
          - "OpenStack cloud profile: {{ ironic_clouds_yaml_path if (ironic_clouds_yaml_enabled | bool) else 'disabled' }}"
          - "Generated QUICKSTART: {{ ironic_quickstart_path if (ironic_quickstart_enabled | bool) else 'disabled' }}"
          - "============================================"
          - "Test API: curl -u {{ ironic_admin_username }}:<password> http://{{ ironic_api_host }}:{{ ironic_api_port }}/v1/nodes"
          - "Test CLI: {{ (ironic_cli_wrapper_path ~ ' node list') if (ironic_cli_enabled | bool) else 'skipped (ironic_cli_enabled=false)' }}"
          - "Test --os-cloud: {{ ('openstack --os-cloud ' ~ ironic_cloud_name ~ ' baremetal node list') if (ironic_clouds_yaml_enabled | bool) else 'skipped (ironic_clouds_yaml_enabled=false)' }}"
          - "============================================"
