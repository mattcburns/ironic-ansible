---
# Main deployment playbook for Standalone Ironic

- name: Setup Prerequisites
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: common

- name: Deploy Infrastructure Services
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: mariadb
    - role: rabbitmq

- name: Deploy IPA Images
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ipa_downloader

- name: Deploy Ironic Configuration and Schema
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ironic_common

- name: Deploy Ironic Services
  hosts: ironic
  become: true
  gather_facts: true
  roles:
    - role: ironic_http
    - role: ironic_api
    - role: ironic_conductor

- name: Validate Deployment
  ansible.builtin.import_playbook: validate.yml

- name: Display Deployment Summary
  hosts: ironic
  gather_facts: false
  tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "Ironic Deployment Complete!"
          - "============================================"
          - "Ironic API: http://{{ ironic_api_host }}:{{ ironic_api_port }}"
          - "HTTP Server: http://{{ ironic_api_host }}:{{ ironic_http_port }}"
          - "MariaDB: localhost:{{ mariadb_port }}"
          - "RabbitMQ: localhost:{{ rabbitmq_amqp_port }}"
          - "RabbitMQ Management: http://localhost:{{ rabbitmq_management_port }}"
          - "============================================"
          - "Test: curl -u {{ ironic_admin_username }}:<password> http://{{ ironic_api_host }}:{{ ironic_api_port }}/v1/nodes"
          - "============================================"
