---
- name: Validate Ironic Deployment
  hosts: ironic
  become: true
  gather_facts: false
  tasks:
    - name: Check service status
      ansible.builtin.command: "systemctl is-active {{ item }}"
      register: service_checks
      loop:
        - mariadb
        - rabbitmq
        - ironic-api
        - ironic-http
      changed_when: false
      failed_when: false

    - name: Check conductor service status
      ansible.builtin.command: "systemctl is-active ironic-conductor@{{ item.name }}"
      register: conductor_checks
      loop: "{{ ironic_conductor_groups }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false

    - name: Verify ports are listening
      ansible.builtin.wait_for:
        port: "{{ item.port }}"
        timeout: 10
      loop:
        - { name: "MariaDB", port: "{{ mariadb_port }}" }
        - { name: "RabbitMQ", port: "{{ rabbitmq_amqp_port }}" }
        - { name: "Ironic API", port: "{{ ironic_api_port }}" }
        - { name: "HTTP Server", port: "{{ ironic_http_port }}" }
      loop_control:
        label: "{{ item.name }}"
      register: port_checks
      failed_when: false

    - name: Check Ironic API health
      ansible.builtin.uri:
        url: "http://localhost:{{ ironic_api_port }}/v1"
        method: GET
        status_code: [200, 401, 403]
      register: api_health
      failed_when: false

    - name: Display validation results
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "Validation Results"
          - "============================================"
          - "{% for r in service_checks.results %}{{ r.item }}: {{ 'OK' if r.rc == 0 else 'FAILED' }}  {% endfor %}"
          - "{% for r in conductor_checks.results %}conductor@{{ r.item.name }}: {{ 'OK' if r.rc == 0 else 'FAILED' }}  {% endfor %}"
          - "API Health: {{ 'Reachable' if api_health.status is defined and api_health.status in [200, 401, 403] else 'Unreachable' }}"
          - "============================================"
