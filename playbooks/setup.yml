---
# Setup playbook for Ironic deployment
# This playbook sets up prerequisites, creates users, directories, and Docker network.

- name: Setup Ironic Prerequisites
  hosts: localhost
  become: true
  gather_facts: true

  tasks:
    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0
      ignore_errors: true

    - name: Fail if Docker is not installed
      ansible.builtin.fail:
        msg: "Docker is not installed. Please install Docker and retry."
      when: docker_version.rc != 0

    - name: Create Ironic service group
      ansible.builtin.group:
        name: "{{ ironic_service_group }}"
        state: present
        system: true

    - name: Create Ironic service user
      ansible.builtin.user:
        name: "{{ ironic_service_user }}"
        group: "{{ ironic_service_group }}"
        state: present
        system: true
        shell: /bin/false
        create_home: false

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ ironic_data_root }}"
        - "{{ mariadb_data_dir }}"
        - "{{ rabbitmq_data_dir }}"
        - "{{ ironic_http_images_dir }}"
        - "{{ ipa_images_directory }}"
        - "{{ ironic_etc_dir }}"
        - "{{ ironic_var_log_dir }}"

    - name: Set ownership for data directories
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ ironic_service_user }}"
        group: "{{ ironic_service_group }}"
        state: directory
        recurse: true
      loop:
        - "{{ ironic_data_root }}"
        - "{{ ironic_etc_dir }}"
        - "{{ ironic_var_log_dir }}"

    - name: Create Docker network
      community.docker.docker_network:
        name: ironic-network
        driver: bridge
        state: present

    - name: Create htpasswd file for HTTP Basic Auth
      ansible.builtin.command: >
        htpasswd -bcB /dev/null admin {{ ironic_admin_password }} > {{ ironic_etc_dir }}/htpasswd
      args:
        creates: "{{ ironic_etc_dir }}/htpasswd"
      ignore_errors: true

    - name: Set permissions for htpasswd file
      ansible.builtin.file:
        path: "{{ ironic_etc_dir }}/htpasswd"
        owner: "{{ ironic_service_user }}"
        group: "{{ ironic_service_group }}"
        mode: '0640'
      ignore_errors: true

    - name: Make IPA downloader script executable
      ansible.builtin.file:
        path: "{{ ipa_downloader_script_path }}"
        mode: '0755'
        owner: "{{ ironic_service_user }}"
        group: "{{ ironic_service_group }}"
      ignore_errors: true
