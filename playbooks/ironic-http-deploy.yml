---
# Ironic HTTP Server deployment playbook

- name: Deploy Ironic HTTP Server Service
  hosts: localhost
  become: true
  gather_facts: true

  tasks:
    - name: Deploy Ironic HTTP service template
      ansible.builtin.template:
        src: ironic-http.service.j2
        dest: /etc/systemd/system/ironic-http.service
        mode: '0644'
        backup: true
      notify: Restart systemd

    - name: Enable and start Ironic HTTP service
      ansible.builtin.systemd:
        name: ironic-http
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Ironic HTTP server to be ready
      ansible.builtin.wait_for:
        port: "{{ ironic_http_port }}"
        timeout: 60
      ignore_errors: true

handlers:
  - name: Restart systemd
    ansible.builtin.systemd:
      daemon_reload: true
