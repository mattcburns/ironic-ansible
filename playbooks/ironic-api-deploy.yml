---
# Ironic API deployment playbook

- name: Deploy Ironic API Service
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    ironic_config_generator: "/opt/ironic/generate-config.sh"
    docker_bin: "/usr/bin/docker"

  tasks:
    - name: Deploy Ironic configuration
      ansible.builtin.template:
        src: ironic.conf.j2
        dest: "{{ ironic_etc_dir }}/ironic.conf"
        mode: '0640'
        owner: "{{ ironic_service_user }}"
        group: "{{ ironic_service_group }}"
        backup: true

    - name: Deploy Ironic API service template
      ansible.builtin.template:
        src: ironic-api.service.j2
        dest: /etc/systemd/system/ironic-api.service
        mode: '0644'
        backup: true
      notify: Restart systemd

    - name: Enable and start Ironic API service
      ansible.builtin.systemd:
        name: ironic-api
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Ironic API to be ready
      ansible.builtin.wait_for:
        port: "{{ ironic_api_port }}"
        timeout: 60
      ignore_errors: true

handlers:
  - name: Restart systemd
    ansible.builtin.systemd:
      daemon_reload: true
